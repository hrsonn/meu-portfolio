<section id="skills" class="hero Third-Page" aria-labelledby="skills-titulo">
  <div class="skills-bg" aria-hidden="true">
    <span class="skills-blob skills-blob--top-left"></span>
    <span class="skills-blob skills-blob--top-right"></span>
    <span class="skills-blob skills-blob--bottom-left"></span>
  </div>

  <div class="skills-curves" aria-hidden="true">
    <span class="skills-curve skills-curve--a"></span>
    <span class="skills-curve skills-curve--b"></span>
  </div>

  <div class="skills-stage">
    <h2 id="skills-titulo" class="skills-tag">Minhas<br />Skills</h2>
  </div>

  <div class="skills-main" aria-label="Lista de habilidades por área">
    <article class="skills-group skills-group--frontend" aria-labelledby="skills-front-end">
      <header class="skills-heading">
        <h3 id="skills-front-end" class="skills-title">FRONT-END!</h3>
        <img
          class="skills-icon skills-icon--laptop"
          src="/assets/imgs/asste-coffee.png"
          width="88"
          height="88"
          alt=""
          aria-hidden="true"
        />
      </header>

      <div class="skills-list" role="list" aria-label="Tecnologias de front-end">
        <p class="skill-name skill-name--html" role="listitem">HTML &amp; CSS</p>
        <p class="skill-name skill-name--javascript" role="listitem">JAVASCRIPT</p>
        <p class="skill-name skill-name--typescript" role="listitem">TYPESCRIPT</p>
        <p class="skill-name skill-name--angular" role="listitem">ANGULAR</p>
      </div>
    </article>

    <article class="skills-group skills-group--design" aria-labelledby="skills-design">
      <header class="skills-heading">
        <h3 id="skills-design" class="skills-title">DESIGN!</h3>
        <img
          class="skills-icon skills-icon--pen"
          src="/assets/imgs/asste-fire.png"
          width="88"
          height="88"
          alt=""
          aria-hidden="true"
        />
      </header>

      <div class="skills-list" role="list" aria-label="Ferramentas de design">
        <p class="skill-name skill-name--figma" role="listitem">FIGMA</p>
        <p class="skill-name skill-name--canva" role="listitem">CANVA</p>
      </div>
    </article>

    <article class="skills-group skills-group--backend" aria-labelledby="skills-back-end">
      <header class="skills-heading skills-heading--reverse">
        <img
          class="skills-icon skills-icon--gear"
          src="/assets/imgs/asste-hashtag.png"
          width="88"
          height="88"
          alt=""
          aria-hidden="true"
        />
        <h3 id="skills-back-end" class="skills-title">BACK-END!</h3>
      </header>

      <div class="skills-list" role="list" aria-label="Tecnologias de back-end">
        <p class="skill-name skill-name--python" role="listitem">PYTHON</p>
        <p class="skill-name skill-name--node" role="listitem">NODE.JS</p>
        <p class="skill-name skill-name--java" role="listitem">JAVA</p>
      </div>
    </article>
  </div>

  <img
    class="skills-nerd"
    src="/assets/imgs/icon-nerd.png"
    alt="Ilustração de personagem nerd apontando para cima"
    width="1024"
    height="1024"
  />
</section>
