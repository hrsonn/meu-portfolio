<section id="contato" class="contact" aria-labelledby="contato-titulo">
  <div class="contact-bg" aria-hidden="true">
    <span class="contact-spray contact-spray--tl"></span>
    <span class="contact-spray contact-spray--tr"></span>
    <span class="contact-spray contact-spray--bl"></span>
    <span class="contact-spray contact-spray--br"></span>
    <span class="contact-spray contact-spray--center"></span>
  </div>

  <div class="contact-content">
    <address class="contact-stage">
      <h2 id="contato-titulo" class="contact-title">FALA<br />COMIGO!</h2>

      <ul class="contact-pills" aria-label="Meios de contato">
        <li>
          <a class="contact-pill" href="mailto:hs482075@gmail.com">
            <span class="contact-pill-icon" aria-hidden="true">@</span>
            <span class="contact-pill-label">E-MAIL</span>
            <span class="contact-pill-value">hs482075@gmail.com</span>
          </a>
        </li>

        <li>
          <a class="contact-pill" href="https://github.com/hrsonn" target="_blank" rel="noopener noreferrer">
            <span class="contact-pill-icon" aria-hidden="true">&#6211;</span>
            <span class="contact-pill-label">GITHUB</span>
            <span class="contact-pill-value">@hrsonn</span>
          </a>
        </li>

        <li>
          <a class="contact-pill" href="https://www.linkedin.com/in/harrison-oliveira-464298360/" target="_blank" rel="noopener noreferrer">
            <span class="contact-pill-icon" aria-hidden="true">in</span>
            <span class="contact-pill-label">LINKEDIN</span>
            <span class="contact-pill-value">Harrison Oliveira</span>
          </a>
        </li>
      </ul>
    </address>

    <form class="contact-form" action="https://formspree.io/f/mpqndbqp" method="POST">
      <label class="contact-form-label">
        <span class="sr-only">Nome</span>
        <input class="contact-form-input" type="text" name="nome" placeholder="Seu nome" required />
      </label>
      <label class="contact-form-label">
        <span class="sr-only">Email</span>
        <input class="contact-form-input" type="email" name="email" placeholder="Seu email" required />
      </label>
      <label class="contact-form-label">
        <span class="sr-only">Mensagem</span>
        <textarea class="contact-form-input contact-form-msg" name="mensagem" placeholder="Sua mensagem" rows="4" required></textarea>
      </label>
      <button class="contact-form-btn" type="submit">ENVIAR</button>
    </form>
  </div>

  <img
    class="contact-avatar"
    src="/assets/imgs/icon-contact.webp"
    alt=""
    width="400"
    height="400"
    aria-hidden="true"
  />
</section>
