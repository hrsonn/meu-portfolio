<section id="inicio" class="hero-section" aria-labelledby="hero-title">


  <div class="hero-blobs" aria-hidden="true">
    <span class="hero-blob hero-blob--a"></span>
    <span class="hero-blob hero-blob--b"></span>
    <span class="hero-blob hero-blob--c"></span>
  </div>

  <div class="hero-row">
    <time class="hero-year-left" [attr.datetime]="startYearStr">{{ startYear }}</time>

    <div class="hero-graphic">
      <img
        src="/assets/imgs/PORTFOLIO-IMG.webp"
        alt="Logotipo do portfólio com a palavra Portfolio em tipografia estilizada com contorno rosa sobre fundo preto"
        width="520"
        height="auto"
        loading="eager"
      />
    </div>

    <time class="hero-year-right" [attr.datetime]="currentYearStr">{{ currentYear }}</time>
  </div>

  <h1 id="hero-title" class="hero-headline">Harrison <span class="hero-headline-em">'Son'</span> Santos</h1>
  <p class="hero-sub">Front-End Developer &amp; Designer</p>
  <a class="hero-cta" href="#projetos">VEJA MEUS PROJETOS</a>
</section>
